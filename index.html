<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ngôi nhà của những ước mơ - Login</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      display: flex;
      width: 800px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .left {
      flex: 1;
      padding: 40px;
      color: #ff4d7e;
    }
    .right {
      flex: 1;
      padding: 40px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .login-btn {
      background: #4f8df7;
      color: white;
    }
    .create-btn {
      margin-top: 15px;
      background: white;
      border: 1px solid #4f8df7;
      color: #4f8df7;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="left">
    <h1>Ngôi nhà của những ước mơ</h1>
    <p>Nơi chia sẻ hình ảnh và câu chuyện của lớp chúng ta ❤️</p>
  </div>

  <div class="right">
    <h2>Đăng nhập</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="login-btn" type="button" onclick="login()">Log in</button>

    <p style="text-align:center;">or</p>

    <button class="create-btn" type="button" onclick="goToSignup()">Create new account</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://vzznktcbhkmouknjtyjg.supabase.co";
  const SUPABASE_KEY = "sb_publishable_FAkJ_2gVnmA1X6DM56zkUA_Jqmtx61K";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert("Lỗi đăng nhập: " + error.message);
      return;
    }

    alert("Đăng nhập thành công!");

    if (email === "admindiendannvca1@gmail.com") {
      window.location.href = "index_admin.html";
    } else {
      window.location.href = "view.html";
    }
  }

  function goToSignup() {
    window.location.href = "signup.html";
  }
</script>

</body>
</html>
